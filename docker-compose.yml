# Production / NAS deployment stack (default `docker compose up`).
# Synology Container Manager and similar UIs read this file automatically.
# For local development with Mailpit and hot-reload, use docker-compose.dev.yml.
x-app: &app
  build:
    context: .
    dockerfile: Dockerfile
  image: hut-hunter:latest
  restart: unless-stopped
  env_file:
    - .env
  environment:
    DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-huthunter}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-huthunter}
    REDIS_URL: redis://redis:6379
  volumes:
    - artifacts_data:/app/artifacts

services:
  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    image: hut-hunter-web:latest
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      hold_worker:
        condition: service_started
    ports:
      - "${WEB_PORT:-8080}:80"

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-huthunter}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-huthunter}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-huthunter} -d ${POSTGRES_DB:-huthunter}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  api:
    <<: *app
    command: ["sh", "-lc", "alembic -c alembic.ini upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  poll_worker:
    <<: *app
    command: ["python", "bin/run_poll_worker.py"]
    depends_on:
      api:
        condition: service_healthy

  hold_worker:
    <<: *app
    entrypoint: ["/usr/bin/tini", "--", "/usr/local/bin/hold-entrypoint.sh"]
    command: ["python", "bin/run_hold_worker.py"]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-huthunter}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-huthunter}
      REDIS_URL: redis://redis:6379
      BROWSER_DISPLAY: ":99"
      DISPLAY: ":99"
      X11VNC_PORT: 5900
    shm_size: "1gb"
    depends_on:
      api:
        condition: service_healthy

volumes:
  artifacts_data:
  postgres_data:
  redis_data:
