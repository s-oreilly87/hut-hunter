# Each model carries a two-sided `pricing: { input_per_1k, output_per_1k }` block
# ($/1k tokens). Local/flat-rate models are 0.0/0.0. Keep OpenRouter rates fresh
# with `thrifty models sync` (pulls the live /api/v1/models catalog).
version: 1
providers:
  ollama:
    base_url: http://192.168.1.254:11434/v1
    kind: ollama_native
    api_key: ollama
  openrouter:
    base_url: https://openrouter.ai/api/v1
    kind: openai_compatible
    api_key_env: OPENROUTER_API_KEY
models:
  qwen2.5-coder:7b:
    provider: ollama
    tier: local_fast
    roles:
    - discovery
    - trivial_executor
    pricing:
      input_per_1k: 0.0
      output_per_1k: 0.0
    # Discover stage 1: task + ~5 candidates ≈ 1K tokens. Stage 2 (full path list):
    # ~300 paths × 12 tokens ≈ 4K tokens. 8K is generous headroom.
    # Also used for trivial execute via aider — single-file edits fit easily in 8K.
    num_ctx: 8192
    measured:
      latency_s: 12
      gpu_only: true
    notes: >
      Fast, cheap model for discovery and trivial single-line edits only.
      Unreliable for non-trivial execute tasks — use qwen3.5 instead.
      Routed via the trivial_edit rule (files <= 2, skip_planner).
  qwen3.5:
    provider: ollama
    backend: local_agent
    tier: local_reasoning
    roles:
    - executor
    - planner
    - reviewer
    pricing:
      input_per_1k: 0.0
      output_per_1k: 0.0
    # Execute (via aider): ShowInventory.tsx alone can be 300-500 lines (~6-10K tokens).
    # With 3-4 files the context is comfortably over 16K before the plan context is added.
    # The 16K reduction caused aider's empty-SEARCH loop (model can't see file content →
    # uses filename as SEARCH placeholder → loops). 32K is the price of multi-file execute.
    # CPU cost note: 32K KV-cache does add idle load. If that's a problem, route
    # single-file tasks to qwen2.5-coder:7b and accept that complex tasks run hot.
    num_ctx: 32768
    # Planning: cap output to prevent thinking spirals on ambiguous prompts.
    # The plan is deterministic-first anyway; LLM enrichment only runs when
    # the response arrives within the timeout.
    plan_timeout_s: 180
    max_plan_tokens: 1500
    measured:
      latency_s: 16.65
      gpu_only: true
      bench_latency_variance: 1.1085
      bug_catch_rate: 1.0
      plan_parse_rate: 0.0
      impl_pass_rate: 1.0
      reasoning_share: 0.0
    notes: >
      Primary executor and local planner. Reasoning model — produces chain-of-thought
      via aider's THINKING/ANSWER blocks (~53s) with high first-pass accuracy.
      CAUTION: on ambiguous tasks (file doesn't contain what the user describes)
      qwen3.5 can spiral in extended thinking and hit the aider timeout. Mitigations:
      (1) plan_timeout_s + max_plan_tokens cap the planning phase; (2) two-stage
      discover reduces irrelevant context reaching execute; (3) use --timeout 90 in
      CLI instead of default 180s to fail fast rather than wait out the full spiral.
  qwen2.5-coder:14b:
    provider: ollama
    tier: local_careful
    roles:
    - reviewer
    - careful_worker
    pricing:
      input_per_1k: 0.0
      output_per_1k: 0.0
    # Review: diff (~2-5K tokens) + task + criteria. 8K is comfortable headroom.
    # Can serve as careful_executor for medium tasks — single-file edits fit in 8K;
    # bump to 16K here if used on multi-file execute tasks.
    num_ctx: 8192
    # Reviewers need time to read a real diff; this is independent of planning.
    review_timeout_s: 180
    measured:
      latency_s: 10.37
      gpu_only: false
      bench_latency_variance: 1.3757
      bug_catch_rate: 1.0
      plan_parse_rate: 1.0
      impl_pass_rate: 1.0
      reasoning_share: 0.0
    notes: >
      Strong local reviewer (100% bug-catch rate, ~8.5s, June 2026 benchmark).
      Used as review_local_fallback when cloud review is unavailable.
      Can also serve as careful_executor for medium-complexity tasks.
  claude:
    provider: cloud
    tier: cloud_strong
    roles:
    - planner
    - high_risk_reviewer
    pricing:
      input_per_1k: 0.0
      output_per_1k: 0.0
    auth_mode: subscription
    flat_rate: true
    notes: >
      Hard planning, ambiguous debugging, final high-risk review only.
      Invoked via Claude Code CLI headless (claude -p), Max subscription — not API billing.
      pricing is 0/0 because billing is flat-rate subscription (flat_rate: true).
  openrouter:anthropic/claude-sonnet-4.5:
    provider: openrouter
    backend: openagent
    tier: cloud_strong
    roles:
    - planner
    - high_risk_reviewer
    - overflow
    pricing:
      input_per_1k: 0.003
      output_per_1k: 0.015
    notes: >
      Cloud overflow via OpenAI-compatible adapter. THR-89 parity bench:
      100% edit success on both aider and openagent (n=3) — openagent is the
      default execute backend here and additionally reports real token usage.
  openrouter:openrouter/auto:
    provider: openrouter
    backend: openagent
    tier: cloud_strong
    roles:
    - planner
    - high_risk_reviewer
    - overflow
    # No pricing block: the Auto Router (NotDiamond-powered) picks a different
    # underlying model per request, so a fixed rate would be wrong. Pre-call
    # estimates fall back to budget.default_cloud_cost_per_1k; the real $ comes
    # from OpenRouter's reported usage.cost, and the actual routed model is
    # recorded as `routed_model` on the run log (THR-90) — cost is never booked
    # against the literal "openrouter/auto" name.
    # cost_quality_tradeoff (0–10) tunes the router: 0 = always pick the most
    # capable model regardless of cost, 10 = cheapest wins. Default 7. Sent as
    # plugins:[{id: auto-router, cost_quality_tradeoff: N}] on the request.
    cost_quality_tradeoff: 7
    notes: >
      OpenRouter Auto Router — the paid cloud tier (THR-90). Thrifty decides
      which phase goes local vs cloud; OpenRouter's router decides which cloud
      model within the paid tier, so we stop hand-maintaining model lists.
      Requires a funded OpenRouter account (THR-36). The response reports the
      real model it routed to (recorded as routed_model) plus usage.cost.
  # OpenRouter Preset (THR-90) — reference a server-side preset by slug. The
  # model/fallback-chain, provider rules, and params live in the preset on
  # OpenRouter (dashboard), NOT here; Thrifty passes "@preset/<slug>" as the
  # model string and still owns the local-vs-cloud phase decision. Register
  # with the openrouter: prefix so it is cloud-gated (--allow-cloud) and routed
  # to OpenRouter. Uncomment and point at a preset that exists on your account:
  # openrouter:@preset/thrifty-review:
  #   provider: openrouter
  #   tier: cloud_strong
  #   roles:
  #   - high_risk_reviewer
  #   - planner
  #   notes: >
  #     Paid-tier recipe via an OpenRouter Preset — fallback chain/provider
  #     rules defined in the preset, so there is no hand-picked model list here.
  openrouter:cohere/north-mini-code:free:
    provider: openrouter
    backend: openagent
    tier: cloud_free
    execute_timeout_s: 90
    roles:
    - discovery
    - planner
    - executor
    - reviewer
    pricing:
      input_per_1k: 0.0
      output_per_1k: 0.0
    edit_format: whole
    measured:
      latency_s: 73.43
      bench_latency_variance: 23850.7657
      bug_catch_rate: 1.0
      plan_parse_rate: 1.0
      impl_pass_rate: 1.0
      reasoning_share: 0.848
    notes: >
      Cohere North Mini Code — 30B MoE (3B active), agentic coding model.
      256K context, 64K max output. edit_format: whole — agentic harness
      models emit full files more reliably than SEARCH/REPLACE via aider.
      THR-89 parity bench: 100% edit success on both backends (n=3), openagent
      faster on average — promoted to the default execute backend.
  openrouter:poolside/laguna-xs-2.1:free:
    provider: openrouter
    tier: cloud_free
    execute_timeout_s: 90
    roles:
    - discovery
    - planner
    - executor
    - reviewer
    pricing:
      input_per_1k: 0.0
      output_per_1k: 0.0
    edit_format: whole
    measured:
      latency_s: 16.19
      bench_latency_variance: 57.7203
      bug_catch_rate: 1.0
      plan_parse_rate: 1.0
      impl_pass_rate: 1.0
      reasoning_share: 0.762
      bench_rate_limit_hits: 8
    notes: >
      Poolside Laguna XS 2.1 — 33B-A3B coding agent with tool calling and
      reasoning, 256K context. edit_format: whole for aider execute.
      Best suited for planner/reviewer phases. Not covered by the THR-89
      parity bench (only cohere/north-mini-code:free and gpt-oss-20b:free
      were sampled) — stays on aider until benched.
phase_defaults:
  discover: qwen2.5-coder:7b
  plan: qwen3.5
  execute: qwen3.5
  review: qwen2.5-coder:14b
